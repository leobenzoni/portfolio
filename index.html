<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leonardo Benzoni</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="window" aria-label="leonardo benzoni portfolio">

    <!-- Title bar: old-Photoshop document window.
         Traffic lights left: close / theme toggle (middle) / fullscreen.
         Symbols reveal on hover. Filename centered, with the live date
         baked into the name (img + DDMMYY). -->
    <header class="titlebar">
      <div class="lights">
        <button class="light light--close" type="button" aria-label="close"></button>
        <button class="light light--toggle" type="button" aria-label="toggle dark mode"></button>
        <button class="light light--full" type="button" aria-label="fullscreen"></button>
      </div>

      <div class="titlebar__title">
        <span class="titlebar__icon" aria-hidden="true">
          <img src="assets/file-icon.png" alt="" />
        </span>
        <span class="titlebar__name"><span id="filedate">img000000</span>.jpg&nbsp;&nbsp;@&nbsp;33.3%&nbsp;(RGB/8*)</span>
      </div>
    </header>

    <!-- Document canvas. Name vertically centred at the left; role +
         tagline bottom-left; socials bottom (left of the gallery); the
         gallery fills the right half and scrolls; a Photoshop-style
         vertical scrollbar sits on the right edge. -->
    <section class="canvas">
      <p class="name" contenteditable="true" spellcheck="false" aria-label="name (editable)">LEONARDO BENZONI</p>

      <div class="meta">
        <p class="role">Head of Innovation and Brand Designer at <a href="https://nonstopbrandingagency.com/" target="_blank" rel="noopener">Nonstop</a>.</p>
        <p class="tagline">I create cool stuff with cool people.</p>
      </div>

      <nav class="socials" aria-label="links">
        <a href="https://x.com/leobenzoni" target="_blank" rel="noopener">X/Twitter</a>
        <a href="https://www.instagram.com/leobenzoni/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.linkedin.com/in/leonardo-benzoni-1a4344387/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://nonstopbrandingagency.com/" target="_blank" rel="noopener">Agency</a>
      </nav>

      <div class="work" aria-label="work">
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
      </div>

      <!-- Vertical scrollbar (right edge). Thumb tracks the gallery scroll. -->
      <div class="scroll-v" aria-hidden="true"><span class="scroll-v__thumb"></span></div>
    </section>

    <!-- Status bar: Photoshop zoom + doc-size widgets, then a horizontal
         scrollbar groove + thumb. -->
    <footer class="statusbar">
      <span class="statusbar__field statusbar__zoom">33.33%</span>
      <span class="statusbar__field statusbar__doc">Doc: 22.6;/22.6M
        <svg class="statusbar__chevron" viewBox="0 0 6 10" width="6" height="10" aria-hidden="true">
          <path d="M1 1 L5 5 L1 9" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="statusbar__scroll"><span class="statusbar__thumb"></span></span>
    </footer>

  </main>

  <!-- Dock. Auto-hidden at the bottom; reveals on cursor-to-bottom while
       the window is closed. The thumbnail reopens it. -->
  <div class="dock" aria-hidden="true">
    <button class="dock__app" aria-label="reopen window" type="button">
      <span class="dock__win"><span class="dock__bar"></span></span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
