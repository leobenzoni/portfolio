<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leo Benzoni</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Dead-centre of the viewport, behind the window. Only seen once the
       window is closed to the dock. Tapping it reopens (touch path). -->
  <p class="closed-msg" aria-hidden="true">Why would you close it?</p>
  <!-- Cursor hint: appears a few seconds after closing, on desktop only. -->
  <span class="closed-hint" aria-hidden="true">
    <svg viewBox="0 0 16 16" width="16" height="16">
      <path d="M4 6 L8 10 L12 6" stroke="currentColor" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>

  <main class="window" aria-label="leonardo benzoni portfolio">

    <!-- Title bar: old-Photoshop document window.
         Traffic lights left: close / theme toggle (middle) / fullscreen.
         Symbols reveal on hover. Filename centered, with the live date
         baked into the name (img + DDMMYY). -->
    <header class="titlebar">
      <div class="lights">
        <button class="light light--close" type="button" aria-label="close">
          <svg class="light__glyph" viewBox="0 0 12 12" aria-hidden="true">
            <path d="M3.6 3.6 L8.4 8.4 M8.4 3.6 L3.6 8.4" fill="none" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="light light--toggle" type="button" aria-label="toggle dark mode">
          <svg class="light__glyph" viewBox="0 0 12 12" aria-hidden="true">
            <mask id="moonbite">
              <rect width="12" height="12" fill="#000"/>
              <circle cx="6" cy="6" r="3.5" fill="#fff"/>
              <circle cx="7.9" cy="4.1" r="3.2" fill="#000"/>
            </mask>
            <rect width="12" height="12" fill="currentColor" mask="url(#moonbite)"/>
          </svg>
        </button>
        <button class="light light--full" type="button" aria-label="fullscreen">
          <svg class="light__glyph" viewBox="0 0 12 12" aria-hidden="true">
            <path d="M3.1 3.1 L7 3.1 L3.1 7 Z"/>
            <path d="M8.9 8.9 L5 8.9 L8.9 5 Z"/>
          </svg>
        </button>
      </div>

      <div class="titlebar__title">
        <span class="titlebar__icon" aria-hidden="true">
          <img src="assets/file-icon.png" alt="" />
        </span>
        <span class="titlebar__name"><span id="filedate">img000000</span>.jpg<span class="titlebar__meta">&nbsp;&nbsp;@&nbsp;33.3%&nbsp;(RGB/8*)</span></span>
      </div>
    </header>

    <!-- Document canvas. Name vertically centred at the left; role +
         tagline bottom-left; socials bottom (left of the gallery); the
         gallery fills the right half and scrolls; a Photoshop-style
         vertical scrollbar sits on the right edge. -->
    <section class="canvas">
      <p class="name" aria-label="Leonardo Benzoni">LEONARDO BENZONI&nbsp;</p>

      <div class="meta">
        <p class="role">Head of Innovation and Brand Designer at <a href="https://nonstopbrandingagency.com/" target="_blank" rel="noopener">Nonstop</a>.</p>
        <p class="tagline">I combine new technologies with the love for design.</p>
      </div>

      <nav class="socials" aria-label="links">
        <a href="https://x.com/leobenzoni" target="_blank" rel="noopener">X/Twitter</a>
        <a href="https://www.instagram.com/leobenzoni/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.linkedin.com/in/leonardo-benzoni-1a4344387/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://nonstopbrandingagency.com/" target="_blank" rel="noopener">Agency</a>
      </nav>

      <div class="work" aria-label="work">
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
        <div class="work__tile"></div>
      </div>
    </section>

    <!-- Status bar: Photoshop zoom + doc-size widgets, then a horizontal
         scrollbar groove + thumb. -->
    <footer class="statusbar">
      <span class="statusbar__field statusbar__zoom">33.33%</span>
      <span class="statusbar__field statusbar__doc">Doc: 22.6;/22.6M
        <svg class="statusbar__chevron" viewBox="0 0 6 10" width="6" height="10" aria-hidden="true">
          <path d="M1 1 L5 5 L1 9" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </footer>

    <!-- Vertical scrollbar pinned to the window's right edge. Its thumb tracks
         the active scroller (the gallery on desktop, the whole canvas when
         stacked) and can be dragged. -->
    <div class="scroll-v" aria-hidden="true"><span class="scroll-v__thumb"></span></div>

  </main>

  <!-- Dock. Auto-hidden at the bottom; reveals on cursor-to-bottom while
       the window is closed. The thumbnail reopens it. -->
  <div class="dock" aria-hidden="true">
    <button class="dock__app" aria-label="reopen window" type="button">
      <span class="dock__win"><span class="dock__bar"></span></span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
